{% extends "base.html" %}

{% block title %}Admin Profile | NutriSnap{% endblock %}

{% block content %}
<section class="surface-card page-header-card reveal-on-scroll" data-delay="0">
    <div class="d-flex flex-wrap justify-content-between align-items-end gap-2">
        <div>
            <p class="eyebrow mb-1">Admin Settings</p>
            <h1 class="section-title mb-1">Admin Profile</h1>
            <p class="page-subtitle mb-0">Manage your admin account details and password securely.</p>
        </div>
        <a href="{{ url_for('admin.admin_dashboard') }}" class="btn btn-outline-industrial">Back to Admin Dashboard</a>
    </div>
</section>

<section class="surface-card mt-4 reveal-on-scroll" data-delay="1">
    <form method="post" class="row g-3">
        <div class="col-md-6">
            <label for="name" class="form-label">Admin Name</label>
            <input type="text" class="form-control form-control-industrial" id="name" name="name" value="{{ current_user.name }}" required>
        </div>
        <div class="col-md-6">
            <label for="phone" class="form-label">Phone</label>
            <input type="text" class="form-control form-control-industrial" id="phone" name="phone" value="{{ current_user.phone }}" required>
        </div>
        <div class="col-12">
            <label class="form-label">Email</label>
            <input type="email" class="form-control form-control-industrial" value="{{ current_user.email }}" readonly>
        </div>

        <div class="col-12 mt-3"><h2 class="h6 mb-0">Change Password (Optional)</h2></div>
        <div class="col-md-4">
            <label for="current_password" class="form-label">Current Password</label>
            <input type="password" class="form-control form-control-industrial" id="current_password" name="current_password">
        </div>
        <div class="col-md-4">
            <label for="new_password" class="form-label">New Password</label>
            <input type="password" class="form-control form-control-industrial" id="new_password" name="new_password">
        </div>
        <div class="col-md-4">
            <label for="confirm_new_password" class="form-label">Confirm New Password</label>
            <input type="password" class="form-control form-control-industrial" id="confirm_new_password" name="confirm_new_password">
        </div>

        <div class="col-12">
            <button type="submit" class="btn btn-industrial">Update Admin Profile</button>
        </div>
    </form>
</section>
{% endblock %}
