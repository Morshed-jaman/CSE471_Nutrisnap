{% extends "base.html" %}

{% block title %}Register | NutriSnap{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<section class="auth-shell reveal-on-scroll" data-delay="0">
    <article class="surface-card auth-card">
        <p class="eyebrow mb-1">User Registration</p>
        <h1 class="section-title mb-1">Create User Account</h1>
        <p class="page-subtitle mb-4">Start meal logging and nutrition tracking.</p>

        <form method="post" action="{{ url_for('auth.register') }}" class="row g-3">
            <div class="col-md-6">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control form-control-industrial" id="name" name="name" value="{{ form.get('name', '') if form else '' }}" required>
            </div>

            <div class="col-md-6">
                <label for="phone" class="form-label">Phone</label>
                <input type="text" class="form-control form-control-industrial" id="phone" name="phone" value="{{ form.get('phone', '') if form else '' }}" required>
            </div>

            <div class="col-12">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control form-control-industrial" id="email" name="email" value="{{ form.get('email', '') if form else '' }}" required>
            </div>

            <div class="col-md-6">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control form-control-industrial" id="password" name="password" required>
            </div>

            <div class="col-md-6">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" class="form-control form-control-industrial" id="confirm_password" name="confirm_password" required>
            </div>

            <div class="col-12 d-grid">
                <button type="submit" class="btn btn-industrial">Create Account</button>
            </div>
        </form>

        <div class="auth-links mt-4">
            <a href="{{ url_for('auth.login') }}">Already have an account? Login</a>
            <a href="{{ url_for('auth.vendor_register') }}">Register as Vendor</a>
        </div>
    </article>
</section>
{% endblock %}
